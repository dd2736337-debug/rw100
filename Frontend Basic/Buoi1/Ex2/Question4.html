<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Question4</title>
  </head>
  <body>
    <h1>Register</h1>
    <i>Please <b>fill in this form</b> to create an account</i> <br />
    <div>Full name <span style="color: red">*</span></div>
    <input type="text" placeholder="Input your fullname" />
    <br />
    <br />
    <div>Username <span style="color: red">*</span></div>
    <input type="text" placeholder="Input your username" />
    <br /><br />
    <div>Password <span style="color: red">*</span></div>
    <input type="password" placeholder="Input your password" />
    <br /><br />
    <div>Email <span style="color: red">*</span></div>
    <input type="email" placeholder="Input your email" />
    <br />
    <br />
    <div>Telephone number <span style="color: red">*</span></div>
    <input type="number" placeholder="Input your phone number" />
    <br />
    <br />
    <div>
      Input Object <br />
      <input type="radio" name="object" id="Student" />Student
      <input type="radio" name="object" id="Teacher" />Teacher
    </div>
    <div>
      Favorite <br />
      <input type="checkbox" id="Badminton" /><label for="Badminton"
        >Badminton</label
      >
      <input type="checkbox" id="Volleyball" /><label for="Volleyball"
        >Volleyball</label
      >
      <input type="checkbox" id="Football" /><label for="Football"
        >Football</label
      >
    </div>
    <br />
    <div>Address <span style="color: red">*</span></div>
    <select name="address" id="address">
      <option value="bg">Bắc Giang</option>
      <option value="hcm">Hồ Chí Minh</option>
      <option value="hn">Hà Nội</option>
      <option value="dn">Đà nẵng</option>
    </select>
    <br /><br />
    <div>
      Birthday <span style="color: red">*</span> <br />
      <input type="date" />
    </div>
    <br>
    <div>
      Your picture <span style="color: red">*</span> <br />
      <input type="file" />
    </div>
    <br>
    <div>
        <button type="submit">Đăng ký</button>
    </div>
  </body>
</html>
