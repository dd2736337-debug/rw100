<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>

        <!-- Latest compiled and minified CSS & JS -->
        <link
            rel="stylesheet"
            media="screen"
            href="//netdna.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css"
        />
        <script src="//code.jquery.com/jquery.js"></script>
        <script src="//netdna.bootstrapcdn.com/bootstrap/3.3.4/js/bootstrap.min.js"></script>
    </head>
    <body>
        <!-- bs3-container: bo chiều rộng của giao diện lại -->
        <div class="container">
            <form
                id="AccountForm"
                action=""
                class="form-horizontal"
                role="form"
            >
                <div class="form-group">
                    <legend>Quản Lí Account</legend>
                </div>

                <div class="col-xs-8 col-sm-8 col-md-8 col-lg-8">
                    <div class="form-group">
                        <label
                            for="inputUsername"
                            class="col-sm-2 control-label"
                            >Username:</label
                        >
                        <div class="col-sm-10">
                            <input
                                type="text"
                                name="Username"
                                id="inputUsername"
                                class="form-control"
                                required
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label
                            for="inputFullname"
                            class="col-sm-2 control-label"
                            >Fullname:</label
                        >
                        <div class="col-sm-10">
                            <input
                                type="text"
                                name="Fullname"
                                id="inputFullname"
                                class="form-control"
                                required
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="inputAge" class="col-sm-2 control-label"
                            >Age:</label
                        >
                        <div class="col-sm-10">
                            <input
                                type="number"
                                name="Age"
                                id="inputAge"
                                class="form-control"
                                required
                            />
                        </div>
                    </div>
                </div>

                <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">
                    <div class="form-group">
                        <div class="col-sm-10 col-sm-offset-2">
                            <button
                                id="btnCreate"
                                type="submit"
                                class="btn btn-primary"
                            >
                                Create
                            </button>
                        </div>
                        <div class="col-sm-10 col-sm-offset-2">
                            <button
                                id="btnUpdate"
                                type="button"
                                class="btn btn-info"
                            >
                                Update
                            </button>
                        </div>
                    </div>
                </div>
            </form>

            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>FullName</th>
                        <th>Age</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">

                        <td>1</td>

                        <td>FullName1</td>
                        <td>11</td>
                        <td>
                            <button >Update</button>
                            <button onclick="onDelete()">Delete</button>
                        </td>
                    </tr>
                    <tr>
                        <td>1</td>

                        <td>FullName1</td>
                        <td>11</td>
                        <td>
                            <button>Update</button>
                            <button>Delete</button>
                        </td>
                    </tr> -->
                </tbody>
            </table>
        </div>
    </body>
    <script src="/demo.js"></script>
</html>
