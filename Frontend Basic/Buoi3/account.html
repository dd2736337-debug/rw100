<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>

        <!-- Latest compiled and minified CSS & JS -->
        <link
            rel="stylesheet"
            media="screen"
            href="//netdna.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css"
        />
        <script src="//code.jquery.com/jquery.js"></script>
        <script src="//netdna.bootstrapcdn.com/bootstrap/3.3.4/js/bootstrap.min.js"></script>
    </head>
    <body>
        <div class="container">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>FullName</th>
                        <th>Department</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </body>
    <script>
        $.ajax({
            type: "GET",
            url: "https://6a01dfdb36fb6ad04de1e35b.mockapi.io/account",
            dataType: "JSON",
            success: function (response) {
                var tableContent = "";
                for (let i = 0; i < response.length; i++) {
                    tableContent += "<tr>";
                    tableContent += "<td>" + response[i].id + "</td>";
                    tableContent += "<td>" + response[i].email + "</td>";
                    tableContent += "<td>" + response[i].fullName + "</td>";
                    tableContent += "<td>" + response[i].department + "</td>";
                    tableContent +=
                        "<td><button onclick='onHandleUpdate(" +
                        response[i].id +
                        ")'>Edit</button> <button onclick='onDelete(" +
                        response[i].id +
                        ")'>Delete</button></td>";
                    tableContent += "</tr>";
                }
                $("#tableBody").append(tableContent);
            },
        });
    </script>
</html>
