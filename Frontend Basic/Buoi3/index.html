<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Buổi 3</title>
        <style>
            #container {
                width: 80%;
                margin: auto;
            }
            #header {
                background-color: red;
                text-align: center;
            }
            #tableAccount {
                width: 100%;
                border: 1px solid;
            }
            #tableAccount,
            th,
            td {
                border: 1px solid;
                border-collapse: collapse;
            }
        </style>
    </head>
    <body>
        <div id="container">
            <div id="header"><h2>Quản Lý Account</h2></div>
            <div id="modifyAccount">
                <form action="">
                    <div>
                        <label for="username"
                            >Username
                            <input type="text" name="username" />
                        </label>
                    </div>
                    <div>
                        <label for="fullName"
                            >FullName
                            <input type="text" name="fullName" />
                        </label>
                    </div>
                    <div>
                        <label for="age"
                            >Age
                            <input type="text" name="age" />
                        </label>
                    </div>
                    <div>
                        <button>Create</button>
                        <button>Update</button>
                    </div>
                </form>
            </div>
            <div id="showAccount">
                <table id="tableAccount">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>FullName</th>
                        <th>Age</th>
                        <th>Action</th>
                    </tr>
                    <tr>
                        <td>1</td>
                        <td>Username1</td>
                        <td>FullName1</td>
                        <td>11</td>
                        <td>
                            <button>Update</button>
                            <button>Delete</button>
                        </td>
                    </tr>
                </table>
            </div>
        </div>
    </body>
</html>
