<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Buổi 1</title>
        <style>
            p {
                /* line-height:10px;  */
                text-indent: 20px;
            }
            table,
            th,
            tr {
                border: 2px solid;
                border-spacing: 15px;
            }
        </style>
    </head>
    <body>
        <p style="border: dashed; border-width: thick">Hello</p>
        <hr />
        <p>Hello</p>
        <p>1234</p>
        <p>Hi</p>
        <p>Xin Chào</p>
        <hr />
        <table>
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Age</th>
            </tr>
            <tr>
                <th>1</th>
                <th>abc</th>
                <th>11</th>
            </tr>
            <tr>
                <th>2</th>
                <th>def</th>
                <th>12</th>
            </tr>
        </table>
        <hr />
        <div
            style="
                border: 2px solid;
                padding: 20px 100px 10px 200px;
                margin: 100px 50px 30px 50px;
            "
        >
            Đây là header
        </div>
        <div
            style="
                border: 1px solid;
                width: 200px;
                position: absolute;
                top: 100px;
                left: 100px;
            "
        >
            Đây là header
        </div>
        <hr />
        <div style="border: 1px solid; width: 200px">Đây là header</div>
        <div
            style="
                border: 1px solid;
                width: 200px;
                position: absolute;
                top: 200px;
                left: 200px;
            "
        >
            Đây là body
        </div>
        <hr />
        <h1 style="position: fixed; background-color: yellow; top: -20px">
            Đây là Header
        </h1>
        <h2 style="position: sticky; background-color: red; top: 0; width: 100px;">
            Đây là quảng cáo
        </h2>
        <div
            style="
                border: 1px solid;
                width: 200px;
                position: relative;
                height: 50px;
                top: 50px;
            "
        >
            Giỏ hàng
            <span
                style="
                    position: absolute;
                    top: -10px;
                    right: -10px;
                    background-color: red;
                    color: white;
                    border-radius: 50%;
                    width: 20px;
                    height: 20px;
                    text-align: center;
                "
                >3</span
            >
        </div>
    </body>
</html>
