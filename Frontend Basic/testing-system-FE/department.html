<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>

        <!-- bs3-cdn: import thư viện jquery và bootstrap -->

        <!-- Latest compiled and minified CSS & JS -->
        <link
            rel="stylesheet"
            media="screen"
            href="//netdna.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
        />
        <script src="//code.jquery.com/jquery.js"></script>
        <script src="//netdna.bootstrapcdn.com/bootstrap/3.3.4/js/bootstrap.min.js"></script>
        <link rel="stylesheet" href="dep.css">
        
    </head>
    <body>
        <!-- bs3-container: bo chiều rộng của giao diện lại -->

        <div class="container">
            <button
                type="button"
                class="btn btn-default"
                onclick="changeTheme('light')"
            >
                Light
            </button>
            <button
                type="button"
                class="btn btn-default"
                onclick="changeTheme('dark')"
            >
                Dark
            </button>
            <div class="form-group">
                <legend>Quản lý department</legend>
            </div>
            <a
                class="btn btn-primary"
                data-toggle="modal"
                href="#modal-id"
                onclick="resetForm()"
                >Create</a
            >

            <!-- bs3-table:.... -->

            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>

            <!-- bs3-modal -->
            <div class="modal fade" id="modal-id">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <button
                                type="button"
                                class="close"
                                data-dismiss="modal"
                                aria-hidden="true"
                            >
                                &times;
                            </button>
                            <h4 class="modal-title"></h4>
                        </div>
                        <div class="modal-body" style="padding: 0px">
                            <form
                                id="departmentForm"
                                action=""
                                class="form-horizontal"
                                role="form"
                            >
                                <!-- bs3-col:8 : để chứa các ô input -->
                                <!-- bs3-col:4 : để chứa các button -->
                                <div
                                    class="col-xs-8 col-sm-8 col-md-8 col-lg-8"
                                >
                                    <!-- bs3-input:text:h -->
                                    <div class="form-group">
                                        <label
                                            for="inputDepartmentName"
                                            class="col-sm-2 control-label"
                                            >DepartmentName:</label
                                        >
                                        <div class="col-sm-10">
                                            <input
                                                type="text"
                                                name="DepartmentName"
                                                id="inputDepartmentName"
                                                class="form-control"
                                                value=""
                                                required="required"
                                                pattern=""
                                                title=""
                                            />
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button
                                type="button"
                                class="btn btn-primary"
                                id="submit"
                            >
                                Save
                            </button>
                            <button
                                type="button"
                                class="btn btn-default"
                                data-dismiss="modal"
                            >
                                Close
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
    <script src="/department.js"></script>
</html>
