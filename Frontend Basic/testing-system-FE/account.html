            <!-- bs3-modal -->
            <div class="modal fade" id="modal-id">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <button
                                type="button"
                                class="close"
                                data-dismiss="modal"
                                aria-hidden="true"
                            >
                                &times;
                            </button>
                            <h4 class="modal-title"></h4>
                        </div>
                        <div class="modal-body" style="padding: 0px">
                            <form
                                id="accountForm"
                                action=""
                                class="form-horizontal"
                                role="form"
                            >
                                <!-- bs3-col:8 : để chứa các ô input -->
                                <!-- bs3-col:4 : để chứa các button -->
                                <div
                                    class="col-xs-8 col-sm-8 col-md-8 col-lg-8"
                                >
                                    <!-- bs3-input:text:h -->
                                    <div class="form-group">
                                        <label
                                            for="inputAvatar"
                                            class="col-sm-4 control-label"
                                            >Avatar:</label
                                        >
                                        <div class="col-sm-8">
                                            <input
                                                type="text"
                                                name="Avatar"
                                                id="inputAvatar"
                                                class="form-control"
                                                value=""
                                            />
                                        </div>
                                    </div>

                                    <!-- bs3-input:text:h -->
                                    <div class="form-group">
                                        <label
                                            for="inputUsername"
                                            class="col-sm-4 control-label"
                                            >Username:</label
                                        >
                                        <div class="col-sm-8">
                                            <input
                                                type="text"
                                                name="Username"
                                                id="inputUsername"
                                                class="form-control"
                                                required
                                            />
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label
                                            for="inputFullname"
                                            class="col-sm-4 control-label"
                                            >Fullname:</label
                                        >
                                        <div class="col-sm-8">
                                            <input
                                                type="text"
                                                name="Fullname"
                                                id="inputFullname"
                                                class="form-control"
                                                required
                                            />
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label
                                            for="inputEmail"
                                            class="col-sm-4 control-label"
                                            >Email:</label
                                        >
                                        <div class="col-sm-8">
                                            <input
                                                type="email"
                                                name="Email"
                                                id="inputEmail"
                                                class="form-control"
                                                value=""
                                                required="required"
                                                title=""
                                            />
                                        </div>
                                    </div>

                                    <!-- <div class="form-group">
                                        <div class="form-group">
                                            <label

                                            <div class="col-sm-10">

                                                    name=""
                                                    id="inputAge"
                                                    class="form-control"
                                                    required
                                                />
                                            </div>
                                        </div>
                                    </div> -->

                                    <div class="form-group">
                                        <label
                                            for="inputDepartmentName"
                                            class="col-sm-4 control-label"
                                            >DepartmentName:</label
                                        >
                                        <div class="col-sm-8">
                                            <select
                                                name="DepartmentName"
                                                id="inputDepartmentName"
                                                class="form-control"
                                                required="required"

                                                <option value="">Sale</option>
                                                <option value="">Marketing</option> -->

                                                id="inputPositionName"

                                                required="required"

                        <div class="modal-footer">
                            <button

                                class="btn btn-primary"
                                id="submit"
                            >
