<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>

        <!-- bs3-cdn: import thư viện jquery và bootstrap -->

        <!-- Latest compiled and minified CSS & JS -->
        <link
            rel="stylesheet"
            media="screen"
            href="//netdna.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
        />
        <script src="//code.jquery.com/jquery.js"></script>
        <script src="//netdna.bootstrapcdn.com/bootstrap/3.3.4/js/bootstrap.min.js"></script>
        <link rel="stylesheet" href="acc.css" />
    </head>
    <body>
        <div class="panel panel-primary" style="margin-top: 20px">
            <div class="panel-heading">
                <h3 class="panel-title">
                    <i class="fa fa-dashboard"></i> Management System
                </h3>
            </div>

            <div class="panel-body text-center">
                <a href="account.html" class="btn btn-primary btn-lg">
                    <i class="fa fa-user"></i><br />
                    Account
                </a>

                <a
                    href="department.html"
                    class="btn btn-success btn-lg"
                    style="margin: 0 10px"
                >
                    <i class="fa fa-building"></i><br />
                    Department
                </a>

                <a href="position.html" class="btn btn-info btn-lg">
                    <i class="fa fa-briefcase"></i><br />
                    Position
                </a>
            </div>
        </div>
        <!-- bs3-container: bo chiều rộng của giao diện lại -->

        <div class="container">
            <button
                type="button"
                class="btn btn-default"
                onclick="changeTheme('light')"
            >
                Light
            </button>
            <button
                type="button"
                class="btn btn-default"
                onclick="changeTheme('dark')"
            >
                Dark
            </button>
            <div class="form-group">
                <legend>Quản lý account</legend>
            </div>

            <!-- các ô tìm kiếm -->
            <div>
                <!-- bs3-col:5 -->
                <div class="col-xs-5 col-sm-5 col-md-5 col-lg-5">
                    <!-- bs3-input:text:h -->
                    <div class="form-group">
                        <label
                            for="usernameSearch"
                            class="col-sm-4 control-label"
                            >Username:</label
                        >
                        <div class="col-sm-8">
                            <input
                                type="text"
                                name="Username"
                                id="usernameSearch"
                                class="form-control"
                                value=""
                                required="required"
                                pattern=""
                                title=""
                            />
                        </div>
                    </div>
                </div>
                <!-- bs3-col:5 -->
                <div class="col-xs-5 col-sm-5 col-md-5 col-lg-5">
                    <div class="form-group">
                        <label for="emailSearch" class="col-sm-4 control-label"
                            >Email:</label
                        >
                        <div class="col-sm-8">
                            <input
                                type="text"
                                name="Email"
                                id="emailSearch"
                                class="form-control"
                                value=""
                                required="required"
                                pattern=""
                                title=""
                            />
                        </div>
                    </div>
                </div>
                <!-- bs3-col:2 -->
                <div class="col-xs-2 col-sm-2 col-md-2 col-lg-2">
                    <button
                        type="button"
                        class="btn btn-default"
                        onclick="
                            page = 0;
                            loadData();
                        "
                    >
                        Tìm kiếm
                    </button>
                </div>
            </div>

            <div>
                <div class="col-xs-5 col-sm-5 col-md-5 col-lg-5">
                    <div class="form-group">
                        <label
                            for="fullNameSearch"
                            class="col-sm-4 control-label"
                            >Fullname:</label
                        >
                        <div class="col-sm-8">
                            <input
                                type="text"
                                name="Fullname"
                                id="fullNameSearch"
                                class="form-control"
                                value=""
                                required="required"
                                pattern=""
                                title=""
                            />
                        </div>
                    </div>
                </div>
                <div class="col-xs-5 col-sm-5 col-md-5 col-lg-5">
                    <!-- bs3-select:h -->
                    <div class="form-group">
                        <label
                            for="deparmentSearchID"
                            class="col-sm-4 control-label"
                            >DepartmentName:</label
                        >
                        <div class="col-sm-8">
                            <select
                                name="DepartmentName"
                                id="departmentSearchID"
                                class="form-control"
                                required="required"
                            >
                                <option value=""></option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="col-xs-2 col-sm-2 col-md-2 col-lg-2">
                    <a
                        class="btn btn-primary"
                        data-toggle="modal"
                        href="#modal-id"
                        onclick="resetForm()"
                        >Create</a
                    >
                </div>
            </div>

            <div>
                <div class="col-xs-5 col-sm-5 col-md-5 col-lg-5">
                    <div class="form-group">
                        <label
                            for="positionSearchID"
                            class="col-sm-4 control-label"
                            >PositionName:</label
                        >
                        <div class="col-sm-8">
                            <select
                                name="PositionName"
                                id="positionSearchID"
                                class="form-control"
                                required="required"
                            >
                                <option value=""></option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div>
                <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
                    <div class="form-group">
                        <label
                            for="inputnumberOfRecordId"
                            class="col-sm-2 control-label"
                            >Số bản ghi/trang:</label
                        >
                        <div class="col-sm-2">
                            <select
                                name="numberOfRecordId"
                                id="inputnumberOfRecordId"
                                class="form-control"
                                required="required"
                                onchange="loadData()"
                            >
                                <option value="5">5</option>
                                <option value="10">10</option>
                                <option value="15">15</option>
                                <option value="20">20</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- bs3-table:.... -->

            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Avatar</th>
                        <th>Username</th>
                        <th>FullName</th>
                        <th>Email</th>
                        <th>Department Name</th>
                        <th>Position Name</th>
                        <th>Action</th>
                    </tr>
                </thead>

            <!-- Phân trang -->

            <ul class="pagination pagination-lg" id="pagination" style="align-items: center; display: flex; justify-content: center"></ul>

            <!-- <ul
                class="pagination pagination-lg"
                id="pagination"

            <!-- bs3-modal -->
            <div class="modal fade" id="modal-id">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <button
                                type="button"
                                class="close"
                                data-dismiss="modal"
                                aria-hidden="true"
                            >
                                &times;
                            </button>
                            <h4 class="modal-title"></h4>
                        </div>
                        <div class="modal-body" style="padding: 0px">
                            <form
                                id="accountForm"
                                action=""
                                class="form-horizontal"
                                role="form"
                            >
                                <!-- bs3-col:8 : để chứa các ô input -->
                                <!-- bs3-col:4 : để chứa các button -->
                                <div
                                    class="col-xs-8 col-sm-8 col-md-8 col-lg-8"
                                >
                                    <!-- bs3-input:text:h -->
                                    <div class="form-group">
                                        <label
                                            for="inputAvatar"
                                            class="col-sm-4 control-label"
                                            >Avatar:</label
                                        >
                                        <div class="col-sm-8">
                                            <input
                                                type="text"
                                                name="Avatar"
                                                id="inputAvatar"
                                                class="form-control"
                                                value=""
                                            />
                                        </div>
                                    </div>

                                    <!-- bs3-input:text:h -->
                                    <div class="form-group">
                                        <label
                                            for="inputUsername"
                                            class="col-sm-4 control-label"
                                            >Username:</label
                                        >
                                        <div class="col-sm-8">
                                            <input
                                                type="text"
                                                name="Username"
                                                id="inputUsername"
                                                class="form-control"
                                                required
                                            />
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label
                                            for="inputFullname"
                                            class="col-sm-4 control-label"
                                            >Fullname:</label
                                        >
                                        <div class="col-sm-8">
                                            <input
                                                type="text"
                                                name="Fullname"
                                                id="inputFullname"
                                                class="form-control"
                                                required
                                            />
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label
                                            for="inputEmail"
                                            class="col-sm-4 control-label"
                                            >Email:</label
                                        >
                                        <div class="col-sm-8">
                                            <input
                                                type="email"
                                                name="Email"
                                                id="inputEmail"
                                                class="form-control"
                                                value=""
                                                required="required"
                                                title=""
                                            />
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label
                                            for="inputDepartmentName"
                                            class="col-sm-4 control-label"
                                            >DepartmentName:</label
                                        >
                                        <div class="col-sm-8">
                                            <select
                                                name="DepartmentName"
                                                id="inputDepartmentName"
                                                class="form-control"
                                                required="required"
                                            >
                                                <!-- <option value="">Bảo vệ</option>
                                                <option value="">Sale</option>
                                                <option value="">Marketing</option> -->
                                            </select>
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label
                                            for="inputPositionName"
                                            class="col-sm-4 control-label"
                                            >PositionName:</label
                                        >
                                        <div class="col-sm-8">
                                            <select
                                                name="PositionName"
                                                id="inputPositionName"
                                                class="form-control"
                                                required="required"
                                            >
                                                <option value=""></option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div class="modal-footer">
                            <button
                                type="button"
                                class="btn btn-primary"
                                id="submit"
                            >
                                Save
                            </button>
                            <button
                                type="button"
                                class="btn btn-default"
                                data-dismiss="modal"
                            >
                                Close
                            </button>
                        </div>
